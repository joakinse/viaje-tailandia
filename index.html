<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Thailand Travel Hub for a group trip." />
    <title>Thailand Travel Hub</title>
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <a class="brand" href="#home" aria-label="Thailand Travel Hub home">
          <span>TH</span>
          <div>
            <strong>Thailand Hub</strong>
            <small data-trip-dates>Group travel guide</small>
          </div>
        </a>
        <nav class="nav" id="nav"></nav>
      </aside>

      <div class="main">
        <header class="topbar">
          <button class="menu-button" id="menu-button" type="button" aria-label="Open navigation">☰</button>
          <div>
            <small id="section-kicker">Travel guide</small>
            <strong id="section-title">Thailand Travel Hub</strong>
          </div>
          <a class="topbar__cta" href="#checklist">Checklist</a>
        </header>
        <main id="app" tabindex="-1"></main>
      </div>
    </div>

    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
