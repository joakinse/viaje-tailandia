<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Guía de viaje a Tailandia para un viaje en grupo." />
    <title>Guía de viaje a Tailandia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <a class="brand" href="#home" aria-label="Inicio de la guía de Tailandia">
          <span>TH</span>
          <div>
            <strong>Tailandia Hub</strong>
            <small data-trip-dates>Guía del viaje</small>
          </div>
        </a>
        <nav class="nav" id="nav"></nav>
      </aside>

      <div class="main">
        <header class="topbar">
          <button class="menu-button" id="menu-button" type="button" aria-label="Abrir navegación">☰</button>
          <div>
            <small id="section-kicker">Guía de viaje</small>
            <strong id="section-title">Guía de viaje a Tailandia</strong>
          </div>
          <a class="topbar__cta" href="#checklist">Lista de viaje</a>
        </header>
        <main id="app" tabindex="-1"></main>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
